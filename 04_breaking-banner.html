<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>WIADOMOŚCI PRO — Breaking + Ticker</title>
<!--
  WIADOMOŚCI PRO — BREAKING + TICKER wg brand guide: skośny blok PILNE, nagłówek,
  ticker z logo + boxem czasu + przewijanym tekstem + PILNE na końcu + złota nić.
  1920x1080, tło przezroczyste.
  URL: ?label=PILNE&head=Ważny nagłówek&desc=Dodatkowy opis&time=12:45&ticker=Tekst...
-->
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,800;1,800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#cc0000;--red-hi:#ec1c1c;--red-lo:#8f0000;--gold:#d6bd60;--gold-hi:#ffe79a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;font-family:'Oswald',sans-serif}
  .wrap{position:absolute;left:0;right:0;bottom:70px}

  .head{display:flex;align-items:stretch;height:92px;margin:0 60px;position:relative;
    filter:drop-shadow(0 14px 34px rgba(0,0,0,.5))}
  /* PILNE blok skośny */
  .pilne{background:linear-gradient(180deg,var(--red-hi),var(--red) 55%,var(--red-lo));
    display:flex;align-items:center;padding:0 34px 0 30px;
    clip-path:polygon(0 0,100% 0,calc(100% - 26px) 100%,0 100%);
    transform:translateX(-130%);animation:inL .55s cubic-bezier(.16,.84,.3,1) .1s forwards;z-index:2}
  .pilne b{font-family:'Archivo',sans-serif;font-weight:800;font-style:italic;color:#fff;font-size:40px;letter-spacing:2px}
  /* nagłówek */
  .title{flex:1;background:linear-gradient(180deg,#1a1c20,#0a0a0c);margin-left:-18px;padding:0 40px 0 50px;
    display:flex;flex-direction:column;justify-content:center;border-top:1px solid rgba(255,255,255,.06);
    clip-path:polygon(0 0,100% 0,calc(100% - 22px) 100%,0 100%);
    transform:translateX(-130%);animation:inL .55s cubic-bezier(.16,.84,.3,1) .22s forwards}
  .title .h{font-family:'Archivo',sans-serif;font-weight:800;color:#fff;font-size:42px;letter-spacing:.5px;text-transform:uppercase;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .title .d{color:#cfd3d8;font-weight:500;font-size:23px;letter-spacing:1.5px;margin-top:6px;text-transform:uppercase}
  /* chromowy cap z /// */
  .cap{width:120px;background:linear-gradient(180deg,#fff,#cdd2d8 45%,#8b9099 62%,#e8ebee);margin-left:-16px;
    display:flex;align-items:center;justify-content:center;gap:7px;
    clip-path:polygon(0 0,100% 0,calc(100% - 26px) 100%,0 100%);
    transform:translateX(-130%);animation:inL .55s cubic-bezier(.16,.84,.3,1) .3s forwards}
  .cap i{width:9px;height:40px;background:var(--red);transform:skewX(-18deg)}
  .cap i:nth-child(1){opacity:.6}.cap i:nth-child(2){opacity:.8}
  /* złota nić pod nagłówkiem */
  .thread{height:3px;margin:0 60px;background:linear-gradient(90deg,transparent,var(--gold-hi),var(--gold),transparent);
    opacity:0;animation:fade .5s ease .5s forwards}

  /* TICKER */
  .ticker{display:flex;align-items:stretch;height:52px;margin:10px 60px 0;overflow:hidden;
    background:linear-gradient(180deg,#0c0d10,#000);border-top:1px solid #26282e;
    transform:translateY(150%);animation:up .55s cubic-bezier(.16,.84,.3,1) .35s forwards}
  .ticker .brand{display:flex;align-items:center;padding:0 18px;background:linear-gradient(180deg,#15171b,#0a0a0c)}
  .ticker .brand img{height:30px}
  .ticker .time{display:flex;align-items:center;justify-content:center;min-width:120px;background:var(--red);
    color:#fff;font-weight:700;font-size:26px;letter-spacing:1px;clip-path:polygon(0 0,100% 0,calc(100% - 12px) 100%,12px 100%)}
  .track{position:relative;flex:1;overflow:hidden}
  .move{position:absolute;white-space:nowrap;top:50%;transform:translateY(-50%);left:100%;
    color:#fff;font-size:25px;letter-spacing:.5px;animation:scroll 24s linear infinite}
  .move b{color:var(--gold);margin:0 24px;font-weight:600}
  .ticker .end{display:flex;align-items:center;padding:0 22px 0 30px;background:linear-gradient(180deg,var(--red-hi),var(--red-lo));
    color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-style:italic;font-size:22px;letter-spacing:2px;
    clip-path:polygon(18px 0,100% 0,100% 100%,0 100%)}

  @keyframes inL{to{transform:translateX(0)}}
  @keyframes up{to{transform:translateY(0)}}
  @keyframes fade{to{opacity:1}}
  @keyframes scroll{from{left:100%}to{left:-130%}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="pilne"><b id="label">PILNE</b></div>
      <div class="title"><span class="h" id="head">WAŻNY NAGŁÓWEK</span><span class="d" id="desc">DODATKOWY OPIS</span></div>
      <div class="cap"><i></i><i></i><i></i></div>
    </div>
    <div class="thread"></div>
    <div class="ticker">
      <div class="brand"><img src="logo-lockup-rr.png" alt="WIADOMOŚCI PRO"></div>
      <div class="time" id="time">12:45</div>
      <div class="track"><div class="move" id="move">Najnowsze informacje • aktualizacja na bieżąco • <b>wiadomości.pro</b></div></div>
      <div class="end">PILNE</div>
    </div>
  </div>
<script>
  const p=new URLSearchParams(location.search);
  const set=(id,v,up)=>{if(p.get(v))document.getElementById(id).textContent=up?p.get(v).toUpperCase():p.get(v);};
  set('label','label',true);set('head','head',true);set('desc','desc',true);set('time','time');set('move','ticker');
</script>
</body>
</html>
